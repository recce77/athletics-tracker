// ── LOCAL STORAGE ─────────────────────────────────────────────────────────────
function saveToStorage() {
  try {
    localStorage.setItem('at_sessions', JSON.stringify(S.sessions));
    localStorage.setItem('at_races', JSON.stringify(S.races));
  } catch(e) {}
}

function loadFromStorage() {
  try {
    var sess = localStorage.getItem('at_sessions');
    var races = localStorage.getItem('at_races');
    if (sess) S.sessions = JSON.parse(sess);
    if (races) S.races = JSON.parse(races);
  } catch(e) {}
}

loadFromStorage();

// ── HELPERS ───────────────────────────────────────────────────────────────────
function td() {
  return new Date().toISOString().split("T")[0];
}
function gc(id) {
  for (var i=0; i<CH.length; i++) { if (CH[i].id===id) return CH[i]; }
  return CH[0];
}
function gst(v) {
  for (var i=0; i<STYPES.length; i++) { if (STYPES[i].value===v) return STYPES[i]; }
  return STYPES[0];
}
function pt(str) {
  if (!str) return null;
  str = str.trim();
  if (str.indexOf(":") >= 0) {
    var parts = str.split(":");
    return parseFloat(parts[0])*60 + parseFloat(parts[1]);
  }
  return parseFloat(str);
}
function ft(sec) {
  if (sec==null || isNaN(sec)) return "—";
  if (sec >= 60) {
    var m = Math.floor(sec/60);
    var s = (sec - m*60).toFixed(2);
    if (s < 10) s = "0" + s;
    return m + ":" + s;
  }
  return parseFloat(sec).toFixed(2) + "s";
}
function getPBs() {
  var p = {};
  for (var ci=0; ci<CH.length; ci++) {
    var c = CH[ci];
    p[c.id] = {};
    for (var ei=0; ei<EVENTS.length; ei++) {
      var ev = EVENTS[ei];
      var times = [];
      for (var ri=0; ri<S.races.length; ri++) {
        var r = S.races[ri];
        if (r.childId===c.id && r.event===ev && r.time) {
          var t = pt(r.time);
          if (t) times.push(t);
        }
      }
      if (times.length) p[c.id][ev] = Math.min.apply(null, times);
    }
  }
  return p;
}
function cSess(id) {
  return S.sessions.filter(function(s) {
    return s.results.some(function(r) { return r.childId===id; });
  });
}
function cRaces(id) {
  return S.races.filter(function(r) { return r.childId===id; })
    .sort(function(a,b) { return b.date.localeCompare(a.date); });
}
function earnedB(id) {
  var cs = cSess(id);
  var cr = cRaces(id);
  return BADGES.filter(function(b) {
    if (b.id==="first_session") return cs.length >= 1;
    if (b.id==="five_sessions") return cs.length >= 5;
    if (b.id==="ten_sessions")  return cs.length >= 10;
    if (b.id==="first_race")    return cr.length >= 1;
    if (b.id==="three_races")   return cr.length >= 3;
    if (b.id==="pb")            return cr.some(function(r) { return r.isPB; });
    return false;
  });
}
function currentPhase() {
  var now = td();
  for (var i=0; i<PHASES.length; i++) {
    if (now >= PHASES[i].start && now <= PHASES[i].end) return PHASES[i];
  }
  return null;
}
function phaseStatus(p) {
  var now = td();
  if (now > p.end) return "done";
  if (now >= p.start) return "active";
  return "future";
}

// ── RENDER HELPERS ────────────────────────────────────────────────────────────
function av(c, sz) {
  sz = sz || 32;
  return '<div class="av" style="width:'+sz+'px;height:'+sz+'px;background:'+c.color+';font-size:'+Math.round(sz*.38)+'px">'+c.name[0]+'</div>';
}
function chip(t, col) {
  return '<span class="chip" style="background:'+col+'18;color:'+col+'">'+t+'</span>';
}
function barChart(data, color) {
  if (!data || data.length < 2) return '<div style="font-size:11px;color:#9CA3AF;padding:6px 0">Need more results</div>';
  var mn = Math.min.apply(null,data), mx = Math.max.apply(null,data), rng = mx-mn||1;
  var html = '<div class="bar-wrap">';
  for (var i=0; i<data.length; i++) {
    var h = Math.max(10, ((data[i]-mn)/rng*44)+8);
    var op = 0.5 + i/data.length*0.5;
    html += '<div class="bar-col"><div class="bar-val" style="color:'+color+'">'+ft(data[i])+'</div>'
          + '<div class="bar-fill" style="height:'+h+'px;background:'+color+';opacity:'+op+'"></div>'
          + '<div class="bar-lbl">#'+(i+1)+'</div></div>';
  }
  return html + '</div>';
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────

  for (var i=0; i<tabs.length; i++) {
    var el = document.getElementById("tl-"+tabs[i]);
    if (el) el.style.color = tabs[i]===tab ? "#1D4ED8" : "#9CA3AF";
  }
  render();
  window.scrollTo(0,0);
}

  var all = [];
  for (var i=0; i<S.sessions.length; i++) all.push({item:S.sessions[i], kind:"session", sd:S.sessions[i].date});
  for (var i=0; i<S.races.length; i++) all.push({item:S.races[i], kind:"race", sd:S.races[i].date});

  var html = '<div class="page"><div style="font-size:22px;font-weight:900;color:#111827;margin-bottom:2px">Activity Feed</div>'
    + '<div style="font-size:13px;color:#6B7280;margin-bottom:14px">Yang &middot; Xuan &middot; Yi &middot; July 2026</div>'
    + banner;

  for (var i=0; i<all.length; i++) {
    var entry = all[i];
    if (entry.kind === "session") {
      var s = entry.item;
      var st = gst(s.type);
      var rHTML = "";
      for (var j=0; j<s.results.length; j++) {
        var r = s.results[j];
        var c = gc(r.childId);
        if (!r.reps || r.reps.length===0) {
          rHTML += '<div style="background:#F9FAFB;border-radius:10px;padding:8px 10px;margin-bottom:6px;display:flex;align-items:center;gap:8px">'
            + av(c,22)+'<span style="font-size:12px;color:#374151">'+c.name+' — '+r.event+(r.duration?' &middot; '+r.duration+' min':'')+'</span></div>';
        } else {
          var best = Math.min.apply(null,r.reps);
          var sum = 0; for(var k=0;k<r.reps.length;k++) sum+=r.reps[k];
          var avg = (sum/r.reps.length).toFixed(1);
          var rng = (Math.max.apply(null,r.reps)-Math.min.apply(null,r.reps)).toFixed(1);
          var pills = "";
          for (var k=0;k<r.reps.length;k++) {
            var rep = r.reps[k];
            pills += '<span class="pill" style="background:'+(rep===best?c.color:"#E5E7EB")+';color:'+(rep===best?"#fff":"#374151")+';font-weight:'+(rep===best?800:500)+'">'+rep+'s</span>';
          }
          rHTML += '<div style="background:#F9FAFB;border-radius:10px;padding:10px;margin-bottom:6px">'
            + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">'+av(c,22)
            + '<span style="font-size:13px;font-weight:700">'+c.name+'</span>'
            + '<span style="font-size:11px;color:#6B7280">'+r.event+' &middot; '+r.reps.length+' reps</span>'
            + (r.target?'<span style="font-size:10px;color:'+c.color+';font-weight:700">target '+r.target+'s</span>':'')
            + '</div><div style="margin-bottom:6px">'+pills+'</div>'
            + '<div style="display:flex;gap:10px;font-size:11px;color:#6B7280">'
            + '<span>Best <strong style="color:'+c.color+'">'+best+'s</strong></span>'
            + '<span>Avg <strong>'+avg+'s</strong></span>'
            + '<span>Range <strong style="color:'+(parseFloat(rng)>3?"#EF4444":"#059669")+'">'+rng+'s</strong></span>'
            + '</div></div>';
        }
      }
      html += '<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'
        + '<div><div style="font-size:13px;font-weight:700;color:'+st.color+'">'+st.icon+' '+st.label+'</div>'
        + '<div style="font-size:11px;color:#9CA3AF">'+s.date+(s.duration?' &middot; '+s.duration+' min':'')+'</div></div>'
        + chip(s.results.length+' athletes', st.color)+'</div>'
        + (s.notes?'<div style="font-size:12px;color:#6B7280;font-style:italic;margin-bottom:8px">'+s.notes+'</div>':'')
        + rHTML+'</div>';
    } else {
      var r = entry.item;
      var c = gc(r.childId);
      html += '<div class="card" style="border-left:3px solid '+c.color+'">'
        + '<div style="display:flex;justify-content:space-between;align-items:flex-start">'
        + '<div style="display:flex;gap:8px;align-items:center">'+av(c,28)
        + '<div><div style="font-size:13px;font-weight:700">'+r.comp+'</div>'
        + '<div style="font-size:11px;color:#9CA3AF">'+r.date+' &middot; '+r.event+(r.sanctioned?' 🏅':'')+'</div></div></div>'
        + '<div style="text-align:right">'
        + (r.time?'<div style="font-size:20px;font-weight:900;color:'+c.color+'">'+r.time+'</div>':'')
        + (r.isPB?'<div style="font-size:10px;font-weight:800;color:#F59E0B">⭐ PB</div>':'')
        + (r.placing?'<div style="font-size:12px;color:#6B7280">'+r.placing+'</div>':'')
        + '</div></div>'
        + (r.notes?'<div style="font-size:12px;color:#6B7280;margin-top:6px;font-style:italic">'+r.notes+'</div>':'')
        + '</div>';
    }
  }
  return html + '</div>';
}

// ── ATHLETES ──────────────────────────────────────────────────────────────────
function renderAthletes() {
  var c = gc(S.athlete);
  var pbs = getPBs();
  var cr = cRaces(c.id);
  var cs = cSess(c.id);
  var earned = earnedB(c.id);

  var cBtns = "";
  for (var i=0; i<CH.length; i++) {
    var ch = CH[i];
    cBtns += '<button class="cbtn" onclick="selAth(\''+ch.id+'\')" style="border-color:'+(S.athlete===ch.id?ch.color:"#E5E7EB")+';background:'+(S.athlete===ch.id?ch.color:"#fff")+';color:'+(S.athlete===ch.id?"#fff":"#374151")+'">'+ch.name+'</button>';
  }

  var pbEntries = [];
  for (var ev in pbs[c.id]) { if (pbs[c.id].hasOwnProperty(ev)) pbEntries.push({ev:ev, t:pbs[c.id][ev]}); }
  var pbGrid = pbEntries.length===0
    ? '<div class="card" style="color:#9CA3AF;font-size:13px">No timed results yet.</div>'
    : '<div class="grid2">'+pbEntries.map(function(x){ return '<div class="card" style="margin-bottom:0;text-align:center;padding:12px"><div style="font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:1px">'+x.ev+'</div><div style="font-size:22px;font-weight:900;color:'+c.color+'">'+ft(x.t)+'</div></div>'; }).join('')+'</div>';

  var charts = "";
  for (var ei=0; ei<EVENTS.length; ei++) {
    var ev = EVENTS[ei];
    var times = [];
    var sorted = cr.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
    for (var ri=0; ri<sorted.length; ri++) {
      if (sorted[ri].event===ev && sorted[ri].time) { var t=pt(sorted[ri].time); if(t) times.push(t); }
    }
    if (times.length >= 2) {
      var imp = times[times.length-1] < times[0];
      charts += '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
        + '<div style="font-size:13px;font-weight:700">'+ev+' Progress</div>'
        + '<div style="font-size:11px;color:#6B7280">'+times.length+' results</div></div>'
        + barChart(times, c.color)
        + '<div style="display:flex;justify-content:space-between;font-size:11px;color:#6B7280;margin-top:6px">'
        + '<span>First: '+ft(times[0])+'</span>'
        + '<span style="color:'+(imp?"#059669":"#EF4444")+';font-weight:700">Latest: '+ft(times[times.length-1])+' '+(imp?"↓":"↑")+'</span>'
        + '</div></div>';
    }
  }

  var badges = '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">';
  for (var bi=0; bi<BADGES.length; bi++) {
    var b = BADGES[bi];
    var e = false;
    for (var ei2=0; ei2<earned.length; ei2++) { if (earned[ei2].id===b.id) { e=true; break; } }
    badges += '<div class="badge-box" style="background:'+(e?c.light:"#F3F4F6")+';opacity:'+(e?1:.35)+'">'
      + '<div style="font-size:22px">'+b.icon+'</div>'
      + '<div style="font-size:10px;font-weight:700;color:'+(e?c.color:"#6B7280")+'">'+b.label+'</div></div>';
  }
  badges += '</div>';

  var raceList = "";
  var filteredRaces = cr.filter(function(r){ return r.time||r.notes; });
  for (var ri=0; ri<filteredRaces.length; ri++) {
    var r = filteredRaces[ri];
    raceList += '<div class="card" style="border-left:3px solid '+c.color+'">'
      + '<div style="display:flex;justify-content:space-between;align-items:flex-start">'
      + '<div><div style="font-size:13px;font-weight:700">'+r.comp+'</div>'
      + '<div style="font-size:11px;color:#9CA3AF">'+r.date+' &middot; '+r.event+(r.sanctioned?' 🏅':'')+'</div></div>'
      + '<div style="text-align:right">'
      + (r.time?'<div style="font-size:16px;font-weight:900;color:'+c.color+'">'+r.time+'</div>':'')
      + (r.isPB?'<div style="font-size:10px;font-weight:800;color:#F59E0B">⭐ PB</div>':'')
      + (r.placing?'<div style="font-size:12px;color:#6B7280">'+r.placing+'</div>':'')
      + '</div></div>'
      + (r.notes?'<div style="font-size:11px;color:#6B7280;margin-top:4px;font-style:italic">'+r.notes+'</div>':'')
      + '</div>';
  }

  return '<div class="page">'
    + '<div style="font-size:22px;font-weight:900;color:#111827;margin-bottom:12px">Athletes</div>'
    + '<div style="display:flex;gap:8px;margin-bottom:12px">'+cBtns+'</div>'
    + '<div class="card" style="background:'+c.light+';border-left:4px solid '+c.color+'">'
    + '<div style="display:flex;gap:12px;align-items:center">'+av(c,48)
    + '<div><div style="font-size:20px;font-weight:900">'+c.name+'</div>'
    + '<div style="font-size:13px;color:#374151">'+(c.gender==="M"?"Boy":"Girl")+' &middot; Age '+c.age+' &middot; Born '+c.dob+'</div>'
    + '<div style="font-size:12px;color:#6B7280">'+cs.length+' sessions &middot; '+cr.length+' races</div>'
    + '</div></div></div>'
    + '<div class="stitle">Personal Bests</div>'+pbGrid
    + (charts?'<div class="stitle">Progress Charts</div>'+charts:'')
    + '<div class="stitle">Badges</div>'+badges
    + '<div class="stitle">Race History</div>'
    + (raceList||'<div class="card" style="color:#9CA3AF;font-size:13px">No race results yet.</div>')
    + '</div>';
}
function selAth(id) { S.athlete=id; render(); }

// ── LOG ───────────────────────────────────────────────────────────────────────
function renderLog() {
  var savedBanner = S.saved ? '<div class="saved-ok">Saved successfully</div>' : "";
  var cOpts = CH.map(function(c){ return '<option value="'+c.id+'">'+c.name+'</option>'; }).join('');
  var eOpts = EVENTS.map(function(e){ return '<option value="'+e+'"'+(e===S.rf.event?' selected':'')+'>'+e+'</option>'; }).join('');
  var tOpts = STYPES.map(function(t){ return '<option value="'+t.value+'"'+(t.value===S.sf.type?' selected':'')+'>'+t.icon+' '+t.label+'</option>'; }).join('');
  var mBtns = ['session','race'].map(function(m){
    return '<button class="mbtn" onclick="setLM(\''+m+'\')" style="border-color:'+(S.logMode===m?"#1D4ED8":"#E5E7EB")+';background:'+(S.logMode===m?"#1D4ED8":"#fff")+';color:'+(S.logMode===m?"#fff":"#374151")+'">'+(m==="session"?"🏃 Training":"🏁 Race")+'</button>';
  }).join('');

  var liveReps = [S.rf.r1,S.rf.r2,S.rf.r3,S.rf.r4,S.rf.r5].map(function(r){return parseFloat(r)}).filter(function(r){return !isNaN(r)&&r>0});
  var livePreview = "";
  if (liveReps.length > 0) {
    var best = Math.min.apply(null, liveReps);
    livePreview = '<div style="margin:6px 0 10px">';
    for (var pi=0; pi<liveReps.length; pi++) {
      var rep = liveReps[pi];
      livePreview += '<span class="pill" style="background:'+(rep===best?gc(S.rf.childId).color:'#E5E7EB')+';color:'+(rep===best?'#fff':'#374151')+';font-weight:'+(rep===best?700:400)+'">'+rep+'s</span>';
    }
    livePreview += '<span style="font-size:11px;color:#6B7280;margin-left:6px">'+liveReps.length+' reps &middot; best '+best+'s</span></div>';
  }

  var addedR = "";
  for (var i=0; i<S.sf.results.length; i++) {
    var r = S.sf.results[i]; var c = gc(r.childId);
    var rbest = Math.min.apply(null, r.reps);
    var rpills = r.reps.map(function(rp){ return '<span class="pill" style="background:'+(rp===rbest?c.color:'#E5E7EB')+';color:'+(rp===rbest?'#fff':'#374151')+';font-weight:'+(rp===rbest?700:400)+'">'+rp+'s</span>'; }).join('');
    addedR += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;padding:8px;background:#F9FAFB;border-radius:8px;">'+av(c,22)+'<div><div style="font-size:12px;font-weight:600;margin-bottom:3px">'+c.name+' &middot; '+r.event+(r.target?' &middot; target '+r.target+'s':'')+'</div><div>'+rpills+'</div></div></div>';
  }

  var isAerobic = S.sf.type === "aerobic";

  var aerobicSection = '<div class="stitle">Duration per Child (minutes)</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">'
    + '<div style="text-align:center"><div style="font-size:11px;font-weight:600;color:#1D4ED8;margin-bottom:4px">Yang</div><input type="number" inputmode="numeric" placeholder="min" value="'+(S.sf.dur_yang||'')+'" oninput="upSF(\'dur_yang\',this.value)" style="text-align:center;margin-bottom:0"></div>'
    + '<div style="text-align:center"><div style="font-size:11px;font-weight:600;color:#7C3AED;margin-bottom:4px">Xuan</div><input type="number" inputmode="numeric" placeholder="min" value="'+(S.sf.dur_xuan||'')+'" oninput="upSF(\'dur_xuan\',this.value)" style="text-align:center;margin-bottom:0"></div>'
    + '<div style="text-align:center"><div style="font-size:11px;font-weight:600;color:#059669;margin-bottom:4px">Yi</div><input type="number" inputmode="numeric" placeholder="min" value="'+(S.sf.dur_yi||'')+'" oninput="upSF(\'dur_yi\',this.value)" style="text-align:center;margin-bottom:0"></div>'
    + '</div>';

  var repSection = '<div class="stitle">Add Rep Times</div>'
    + '<select onchange="upRF(\'childId\',this.value)">'+cOpts+'</select>'
    + '<select onchange="upRF(\'event\',this.value)">'+eOpts+'</select>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:4px">'
    + '<input type="number" inputmode="decimal" placeholder="Rep 1" value="'+S.rf.r1+'" oninput="upRF(\'r1\',this.value)" style="margin-bottom:0;text-align:center">'
    + '<input type="number" inputmode="decimal" placeholder="Rep 2" value="'+S.rf.r2+'" oninput="upRF(\'r2\',this.value)" style="margin-bottom:0;text-align:center">'
    + '<input type="number" inputmode="decimal" placeholder="Rep 3" value="'+S.rf.r3+'" oninput="upRF(\'r3\',this.value)" style="margin-bottom:0;text-align:center">'
    + '</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px">'
    + '<input type="number" inputmode="decimal" placeholder="Rep 4" value="'+S.rf.r4+'" oninput="upRF(\'r4\',this.value)" style="margin-bottom:0;text-align:center">'
    + '<input type="number" inputmode="decimal" placeholder="Rep 5" value="'+S.rf.r5+'" oninput="upRF(\'r5\',this.value)" style="margin-bottom:0;text-align:center">'
    + '<div></div>'
    + '</div>'
    + livePreview
    + '<input type="text" inputmode="decimal" placeholder="Target pace in seconds (optional, e.g. 45)" value="'+S.rf.target+'" oninput="upRF(\'target\',this.value)">'
    + '<button class="btn btn-gray" onclick="addReps()">Confirm reps for '+gc(S.rf.childId).name+'</button>'
    + (addedR?'<div class="stitle">Ready to save</div>'+addedR:'');

  var sForm = '<div class="card">'
    + '<div class="stitle">Session Details</div>'
    + '<input type="date" value="'+S.sf.date+'" onchange="upSF(\'date\',this.value)">'
    + '<select onchange="upSF(\'type\',this.value)">'+tOpts+'</select>'
    + '<input type="text" placeholder="Session notes (optional)" value="'+S.sf.notes+'" oninput="upSF(\'notes\',this.value)">'
    + (isAerobic ? aerobicSection : repSection)
    + '<button class="btn btn-blue" onclick="saveSess()">Save Session</button>'
    + '</div>';

  var rForm = '<div class="card">'
    + '<div class="stitle">Race Details</div>'
    + '<input type="date" value="'+S.rcf.date+'" onchange="upRCF(\'date\',this.value)">'
    + '<input type="text" placeholder="Competition name" value="'+S.rcf.comp+'" oninput="upRCF(\'comp\',this.value)">'
    + '<select onchange="upRCF(\'childId\',this.value)">'+cOpts+'</select>'
    + '<select onchange="upRCF(\'event\',this.value)">'+eOpts+'</select>'
    + '<input type="text" inputmode="decimal" placeholder="Time e.g. 1:23.78 or 11.68" value="'+S.rcf.time+'" oninput="upRCF(\'time\',this.value)">'
    + '<input type="text" placeholder="Placing e.g. 3rd, Top 8" value="'+S.rcf.placing+'" oninput="upRCF(\'placing\',this.value)">'
    + '<input type="text" placeholder="Notes" value="'+S.rcf.notes+'" oninput="upRCF(\'notes\',this.value)">'
    + '<label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:12px;cursor:pointer">'
    + '<input type="checkbox" '+(S.rcf.sanctioned?"checked":"")+' onchange="upRCF(\'sanctioned\',this.checked)"> 🏅 Sanctioned meet (counts for DSA)</label>'
    + '<button class="btn btn-red" onclick="saveRace()">Save Race Result</button>'
    + '</div>';

  return '<div class="page">'
    + '<div style="font-size:22px;font-weight:900;color:#111827;margin-bottom:12px">Log Activity</div>'
    + savedBanner
    + '<div style="display:flex;gap:8px;margin-bottom:16px">'+mBtns+'</div>'
    + (S.logMode==="session"?sForm:rForm)
    + '</div>';
}
function setLM(m) { S.logMode=m; render(); }
function upSF(k,v) { S.sf[k]=v; if(k==="type") render(); }
function upRF(k,v) { S.rf[k]=v; }
function upRCF(k,v) { S.rcf[k]=v; }
function addReps() {
  var reps = [S.rf.r1,S.rf.r2,S.rf.r3,S.rf.r4,S.rf.r5].map(function(r){return parseFloat(r)}).filter(function(r){return !isNaN(r)&&r>0});
  if (reps.length === 0) { alert("Enter at least one rep time."); return; }
  var target = S.rf.target ? parseFloat(S.rf.target) : undefined;
  var cid = S.rf.childId; var ev = S.rf.event;
  S.sf.results = S.sf.results.filter(function(r){ return r.childId!==cid; });
  S.sf.results.push({childId:cid, event:ev, reps:reps, target:target});
  S.rf.r1=""; S.rf.r2=""; S.rf.r3=""; S.rf.r4=""; S.rf.r5=""; S.rf.target="";
  render();
}
function saveSess() {
  var isAerobic = S.sf.type === "aerobic";
  if (isAerobic) {
    var anyDur = S.sf.dur_yang || S.sf.dur_xuan || S.sf.dur_yi;
    if (!S.sf.date || !anyDur) { alert("Enter duration for at least one child."); return; }
    var aeroRes = [];
    if (S.sf.dur_yang) aeroRes.push({childId:"yang", event:"easy run", reps:[], duration:parseFloat(S.sf.dur_yang)});
    if (S.sf.dur_xuan) aeroRes.push({childId:"xuan", event:"easy run", reps:[], duration:parseFloat(S.sf.dur_xuan)});
    if (S.sf.dur_yi)   aeroRes.push({childId:"yi",   event:"easy run", reps:[], duration:parseFloat(S.sf.dur_yi)});
    S.sessions.push({id:"s"+Date.now(), date:S.sf.date, type:S.sf.type, notes:S.sf.notes, results:aeroRes});
    saveToStorage();
    S.sf = {date:td(), type:"aerobic", notes:"", results:[], dur_yang:"", dur_xuan:"", dur_yi:""};
  } else {
    if (!S.sf.date || S.sf.results.length===0) { alert("Add at least one child's rep times."); return; }
    S.sessions.push({id:"s"+Date.now(), date:S.sf.date, type:S.sf.type, notes:S.sf.notes, results:S.sf.results});
    saveToStorage();
    S.sf = {date:td(), type:"pace", notes:"", results:[]};
  }
  S.rf = {childId:"yang", event:"200m", r1:"", r2:"", r3:"", r4:"", r5:"", target:""};
  S.saved=true; render(); setTimeout(function(){ S.saved=false; render(); }, 2500);
}
function saveRace() {
  if (!S.rcf.date || !S.rcf.comp) { alert("Enter competition name."); return; }
  var pbs=getPBs(); var t=pt(S.rcf.time); var pb=pbs[S.rcf.childId]&&pbs[S.rcf.childId][S.rcf.event];
  var isPB = t && (!pb || t<=pb);
  S.races.push({id:"r"+Date.now(), date:S.rcf.date, comp:S.rcf.comp, childId:S.rcf.childId,
    event:S.rcf.event, time:S.rcf.time||null, placing:S.rcf.placing||null,
    notes:S.rcf.notes, sanctioned:S.rcf.sanctioned, isPB:isPB});
  saveToStorage();
  S.rcf = {date:td(), comp:"", childId:"yang", event:"400m", time:"", placing:"", notes:"", sanctioned:false};
  S.saved=true; render(); setTimeout(function(){ S.saved=false; render(); }, 2500);
}

// ── PACING ────────────────────────────────────────────────────────────────────
function renderPacing() {
  var c = gc(S.pacingChild);
  var refs = PACING[S.pacingChild] || {};
  var ref = refs[S.pacingEvent];
  var avEvs = Object.keys(refs);

  var cBtns = CH.map(function(ch){
    return '<button class="cbtn" onclick="setPC(\''+ch.id+'\')" style="border-color:'+(S.pacingChild===ch.id?ch.color:"#E5E7EB")+';background:'+(S.pacingChild===ch.id?ch.color:"#fff")+';color:'+(S.pacingChild===ch.id?"#fff":"#374151")+'">'+ch.name+'</button>';
  }).join('');

  var eBtns = avEvs.map(function(e){
    return '<button onclick="setPE(\''+e+'\')" style="padding:6px 14px;border-radius:20px;border:1.5px solid '+(S.pacingEvent===e?c.color:"#E5E7EB")+';background:'+(S.pacingEvent===e?c.color:"#F9FAFB")+';color:'+(S.pacingEvent===e?"#fff":"#374151")+';font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;margin:2px">'+e+'</button>';
  }).join('');

  var splits = "";
  if (ref) {
    for (var i=0; i<ref.splits.length; i++) {
      var s = ref.splits[i];
      splits += '<div class="split-row" style="background:'+(s.warn?"#FEF2F2":"#fff")+';border-left-color:'+(s.warn?"#DC2626":c.color)+'">'
        + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'
        + '<div style="font-size:12px;font-weight:800;color:'+(s.warn?"#DC2626":"#6B7280")+';text-transform:uppercase;letter-spacing:1px">'+s.label+'</div>'
        + '<div style="font-size:18px;font-weight:900;color:'+(s.warn?"#DC2626":c.color)+'">'+s.time+'</div></div>'
        + '<div style="font-size:12px;color:'+(s.warn?"#DC2626":"#374151")+';font-weight:'+(s.warn?700:400)+'">'+s.feel+'</div>'
        + '</div>';
    }
  }

  var rules = [
    {icon:"✓", text:"Pain in final section = correct pacing", color:"#059669"},
    {icon:"✗", text:"Pain at halfway = went out too fast",    color:"#DC2626"},
    {icon:"→", text:"First split must feel embarrassingly slow", color:"#1D4ED8"},
    {icon:"→", text:"Let faster starters go — you will see them again", color:"#1D4ED8"}
  ].map(function(r){
    return '<div style="display:flex;gap:10px;margin-bottom:8px;align-items:flex-start">'
      + '<div style="width:22px;height:22px;border-radius:50%;background:'+r.color+'18;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:'+r.color+';flex-shrink:0">'+r.icon+'</div>'
      + '<div style="font-size:13px;color:#374151;padding-top:2px">'+r.text+'</div></div>';
  }).join('');

  return '<div class="page">'
    + '<div style="font-size:22px;font-weight:900;color:#111827;margin-bottom:12px">Race Pacing</div>'
    + '<div style="display:flex;gap:8px;margin-bottom:12px">'+cBtns+'</div>'
    + '<div style="margin-bottom:14px">'+eBtns+'</div>'
    + (ref
      ? '<div class="card" style="background:'+c.light+'"><div style="display:flex;justify-content:space-between;align-items:center">'
        + '<div style="font-size:16px;font-weight:800">'+c.name+' &middot; '+S.pacingEvent+'</div>'
        + '<div style="background:'+c.color+';color:#fff;border-radius:8px;padding:5px 12px;font-size:13px;font-weight:700">Target: '+ref.target+'</div>'
        + '</div></div>'+splits
        + '<div class="card" style="background:#FFFBEB;border-left:3px solid #F59E0B">'
        + '<div style="font-size:11px;font-weight:800;color:#D97706;margin-bottom:6px">RACE DAY — YOUR POSITION</div>'
        + '<div style="font-size:12px;color:#374151;line-height:1.6">Stand at <strong>first split marker</strong>. Call time loud. One word: <strong style="color:#059669">Good</strong> on target &middot; <strong style="color:#DC2626">Ease back</strong> too fast &middot; <strong style="color:#1D4ED8">GO</strong> final stretch.</div></div>'
      : '<div class="card" style="color:#9CA3AF;font-size:13px">No pacing reference for this event yet.</div>')
    + '<div class="stitle">Universal Rules</div>'+rules
    + '</div>';
}
function setPC(id) { S.pacingChild=id; var evs=Object.keys(PACING[id]||{}); S.pacingEvent=evs[0]||"400m"; render(); }
function setPE(e) { S.pacingEvent=e; render(); }

// ── TRAINING PLAN ─────────────────────────────────────────────────────────────
function renderPlan() {
  var cp = currentPhase();
  var cpBanner = "";
  if (cp) {
    cpBanner = '<div class="card" style="background:'+cp.color+'12;border-left:4px solid '+cp.color+'">'
      + '<div style="font-size:10px;font-weight:800;color:'+cp.color+';letter-spacing:1px;text-transform:uppercase">Current Phase</div>'
      + '<div style="font-size:16px;font-weight:900;margin-top:2px">'+cp.phase+'</div>'
      + '<div style="font-size:12px;color:#6B7280;margin-top:2px">'+cp.start+' to '+cp.end+' &middot; '+cp.weeks+' weeks</div>'
      + '</div>';
  }

  var weeklyHTML = "";
  for (var i=0; i<WEEKLY.length; i++) {
    var w = WEEKLY[i];
    weeklyHTML += '<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:10px">'
      + '<div style="width:90px;font-size:11px;font-weight:700;color:'+w.color+';flex-shrink:0;padding-top:2px">'+w.day+'</div>'
      + '<div><div style="font-size:13px;font-weight:700;color:#111827">'+w.session+'</div>'
      + '<div style="font-size:11px;color:#6B7280">'+w.who+'</div></div></div>';
  }

  var phasesHTML = "";
  for (var i=0; i<PHASES.length; i++) {
    var p = PHASES[i];
    var status = phaseStatus(p);
    var isCurrent = status==="active";
    var isDone = status==="done";
    var dotBg = isDone?"#059669":isCurrent?p.color:"#E5E7EB";
    var dotColor = (isDone||isCurrent)?"#fff":"#9CA3AF";
    var dotLabel = isDone?"✓":isCurrent?"▶":(i+1);
    phasesHTML += '<div style="display:flex;gap:12px;margin-bottom:4px">'
      + '<div style="display:flex;flex-direction:column;align-items:center">'
      + '<div class="rd-dot" style="width:36px;height:36px;background:'+dotBg+';color:'+dotColor+';font-size:11px">'+dotLabel+'</div>'
      + (i<PHASES.length-1?'<div class="rd-line"></div>':'')
      + '</div>'
      + '<div class="card" style="flex:1;margin-bottom:8px;'+(isCurrent?'border-left:3px solid '+p.color+';background:'+p.color+'08':'')+'">'
      + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">'
      + '<div style="font-size:14px;font-weight:800;color:'+(isDone?"#059669":isCurrent?p.color:"#374151")+'">'+p.phase+'</div>'
      + (isCurrent?'<span class="chip" style="background:'+p.color+';color:#fff;font-size:10px">NOW</span>':isDone?'<span class="chip" style="background:#D1FAE5;color:#059669;font-size:10px">DONE</span>':'')
      + '</div>'
      + '<div style="font-size:11px;color:#6B7280;margin-bottom:6px">'+p.start+' to '+p.end+' &middot; '+p.weeks+' weeks</div>'
      + '<div style="font-size:11px;color:#374151;margin-bottom:8px">'+p.desc+'</div>'
      + '<div style="display:flex;flex-direction:column;gap:3px">'
      + '<div style="font-size:11px"><span style="font-weight:700;color:#1D4ED8">Yang:</span> <span style="color:#374151">'+p.yang+'</span></div>'
      + '<div style="font-size:11px"><span style="font-weight:700;color:#7C3AED">Xuan:</span> <span style="color:#374151">'+p.xuan+'</span></div>'
      + '<div style="font-size:11px"><span style="font-weight:700;color:#059669">Yi:</span> <span style="color:#374151">'+p.yi+'</span></div>'
      + '</div></div></div>';
  }

  var thisWeek = '<div class="card">'
    + '<div style="font-size:12px;color:#374151;margin-bottom:8px;font-weight:700">200m Intervals &middot; Week 2 (Thursday)</div>'
    + [
        {name:"Yang", reps:"5 x 200m", target:"42-44s", split:"21-22s at 100m", color:"#1D4ED8"},
        {name:"Xuan", reps:"5 x 200m", target:"48-50s", split:"24-25s at 100m", color:"#7C3AED"},
        {name:"Yi",   reps:"3 x 200m", target:"52-55s", split:"26-28s at 100m", color:"#059669"}
      ].map(function(ch){
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F3F4F6">'
          + '<div style="display:flex;gap:8px;align-items:center">'
          + '<div class="av" style="width:26px;height:26px;background:'+ch.color+';font-size:11px">'+ch.name[0]+'</div>'
          + '<div><div style="font-size:13px;font-weight:700">'+ch.name+'</div>'
          + '<div style="font-size:11px;color:#6B7280">'+ch.reps+' &middot; 2-3 min recovery</div></div></div>'
          + '<div style="text-align:right"><div style="font-size:14px;font-weight:800;color:'+ch.color+'">'+ch.target+'</div>'
          + '<div style="font-size:10px;color:#6B7280">split: '+ch.split+'</div></div></div>';
      }).join('')
    + '</div>';

  return '<div class="page">'
    + '<div style="font-size:22px;font-weight:900;color:#111827;margin-bottom:2px">Training Plan</div>'
    + '<div style="font-size:13px;color:#6B7280;margin-bottom:14px">July 2026 to NSG June 2027</div>'
    + cpBanner
    + '<div class="stitle">Weekly Schedule</div><div class="card">'+weeklyHTML+'</div>'
    + '<div class="stitle">This Week Session</div>'+thisWeek
    + '<div class="stitle">Phase Progression</div>'+phasesHTML
    + '</div>';
}

// ── DSA ───────────────────────────────────────────────────────────────────────
function renderDSA() {
  var sanctioned = S.races.filter(function(r){ return r.sanctioned && r.time; });

  var schools = [
    {child:"Yang", school:"Raffles Institution",   criteria:"Top 8 placing in recognised meet. Sports trial Jul/Aug 2029.", color:"#1D4ED8", window:"P6 2029"},
    {child:"Xuan", school:"Cedar Girls Secondary", criteria:"Track and field DSA. Strong sanctioned meet results.",          color:"#7C3AED", window:"P6 2029"},
    {child:"Yi",   school:"TBD",                   criteria:"Decide based on P4-P5 results in 2028-2029.",                   color:"#059669", window:"P6 2031"}
  ].map(function(t){
    var c = CH.filter(function(ch){ return ch.name===t.child; })[0];
    return '<div class="card" style="border-left:4px solid '+t.color+'">'
      + '<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">'+av(c,28)
      + '<div><div style="font-size:14px;font-weight:800">'+t.school+'</div>'
      + '<div style="font-size:11px;color:#6B7280">DSA Window: '+t.window+'</div></div></div>'
      + '<div style="font-size:12px;color:#374151">'+t.criteria+'</div></div>';
  }).join('');

  var sanctionedHTML = sanctioned.length===0
    ? '<div class="card" style="color:#9CA3AF;font-size:13px">No sanctioned meet results yet. Tick sanctioned when logging SA Age Group, NSG, or Pesta Sukan results.</div>'
    : sanctioned.map(function(r){
        var c = gc(r.childId);
        return '<div class="card" style="border-left:3px solid '+c.color+'">'
          + '<div style="display:flex;justify-content:space-between;align-items:flex-start">'
          + '<div style="display:flex;gap:8px;align-items:center">'+av(c,24)
          + '<div><div style="font-size:13px;font-weight:700">'+r.comp+'</div>'
          + '<div style="font-size:11px;color:#9CA3AF">'+r.date+' &middot; '+r.event+'</div></div></div>'
          + '<div style="text-align:right"><div style="font-size:16px;font-weight:900;color:'+c.color+'">'+r.time+'</div>'
          + (r.isPB?'<div style="font-size:10px;font-weight:800;color:#F59E0B">⭐ PB</div>':'')
          + (r.placing?'<div style="font-size:12px;color:#6B7280">'+r.placing+'</div>':'')
          + '</div></div></div>';
      }).join('');

  var roadmap = DSA_ROADMAP.map(function(r,i){
    return '<div style="display:flex;gap:12px;margin-bottom:4px">'
      + '<div style="display:flex;flex-direction:column;align-items:center">'
      + '<div class="rd-dot" style="width:36px;height:36px;background:'+(r.done?r.color:"#E5E7EB")+';color:'+(r.done?"#fff":"#9CA3AF")+';font-size:12px">'+r.year.slice(2)+'</div>'
      + (i<DSA_ROADMAP.length-1?'<div class="rd-line"></div>':'')
      + '</div>'
      + '<div class="card" style="flex:1;margin-bottom:8px;border-left:3px solid '+(r.done?r.color:"#E5E7EB")+'">'
      + '<div style="font-size:13px;font-weight:800;color:'+(r.done?r.color:"#374151")+';margin-bottom:6px">'+r.year+' &middot; '+r.level+'</div>'
      + r.events.map(function(ev){
          return '<div style="font-size:12px;margin-bottom:3px;display:flex;gap:6px;align-items:flex-start">'
            + '<span style="color:'+(ev.indexOf("KEY")>=0?"#DC2626":"#9CA3AF")+';flex-shrink:0">&bull;</span>'
            + '<span style="color:'+(ev.indexOf("KEY")>=0?"#DC2626":"#374151")+';font-weight:'+(ev.indexOf("KEY")>=0?700:400)+'">'+ev+'</span></div>';
        }).join('')
      + '</div></div>';
  }).join('');

  var benchmarks = [
    {ev:"1000m Boys U12", time:"3:40-3:55", note:"Top 8 target for Yang by NSG 2028"},
    {ev:"1000m Girls U12",time:"3:50-4:05", note:"Top 8 target for Xuan by NSG 2028"},
    {ev:"80m Boys U11",   time:"~11.5s",    note:"Competitive benchmark at SA level"},
    {ev:"80m Girls U11",  time:"~11.8s",    note:"Xuan at 11.68 WSE already near this"}
  ].map(function(b,i){
    return '<div style="display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:8px;margin-bottom:'+(i<3?8:0)+'px;border-bottom:'+(i<3?"1px solid #F3F4F6":"none")+'">'
      + '<div><div style="font-size:13px;font-weight:700">'+b.ev+'</div>'
      + '<div style="font-size:11px;color:#6B7280">'+b.note+'</div></div>'
      + '<div style="font-size:15px;font-weight:900;color:#1D4ED8">'+b.time+'</div></div>';
  }).join('');

  return '<div class="page">'
    + '<div style="font-size:22px;font-weight:900;color:#111827;margin-bottom:4px">DSA Portfolio</div>'
    + '<div style="font-size:13px;color:#6B7280;margin-bottom:16px">Direct School Admission — Track and Field</div>'
    + '<div class="stitle">Target Schools</div>'+schools
    + '<div class="stitle">Sanctioned Meet Results 🏅</div>'+sanctionedHTML
    + '<div class="stitle">Competition Roadmap</div>'+roadmap
    + '<div class="stitle">NSG Top 8 Benchmark</div><div class="card">'+benchmarks+'</div>'
    + '</div>';
}

// ── RENDER ────────────────────────────────────────────────────────────────────

function clearData() {
  if (confirm("Clear all saved sessions and races? This cannot be undone.")) {
    try { localStorage.removeItem("at_sessions"); localStorage.removeItem("at_races"); } catch(e) {}
    location.reload();
  }
}

function render() {
  var app = document.getElementById("app");
  if (!app) return;
  if (S.tab==="feed")     app.innerHTML = renderFeed();
  if (S.tab==="athletes") app.innerHTML = renderAthletes();
  if (S.tab==="log")      app.innerHTML = renderLog();
  if (S.tab==="pacing")   app.innerHTML = renderPacing();
  if (S.tab==="plan")     app.innerHTML = renderPlan();
  if (S.tab==="dsa")      app.innerHTML = renderDSA();
}

render();
</script>
